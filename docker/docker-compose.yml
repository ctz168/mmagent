# MiniMax Agent - Development Environment
version: '3.8'

services:
  # Agent API Backend
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mmagent-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=true
      - LLM_GATEWAY_BASE_URL=${LLM_GATEWAY_BASE_URL:-http://10.138.255.202:8080}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-http://127.0.0.1:8765}
      - WORKSPACE_DIR=/workspace
      - UV_INDEX_URL=${UV_INDEX_URL:-http://mirrors.cloud.aliyuncs.com/pypi/simple}
    volumes:
      - ../workspace:/workspace
      - ../claude_agent_sdk:/app/claude_agent_sdk
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mmagent-network

  # Frontend (Development)
  frontend:
    image: node:20-alpine
    container_name: mmagent-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - mmagent-network

networks:
  mmagent-network:
    driver: bridge
